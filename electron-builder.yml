appId: com.storytime.app
productName: Storytime
directories:
  app: electron-app
  output: release
  buildResources: build
asar: false
npmRebuild: false
files:
  - "**/*"
  - "!**/node_modules"
extraFiles:
  - from: "electron-app/standalone/node_modules"
    to: "resources/app/standalone/node_modules"
mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  identity: null
afterPack: ./scripts/ad-hoc-sign.js
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education
